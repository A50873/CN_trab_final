syntax="proto3";

import "google/protobuf/timestamp.proto";
option java_multiple_files = true;
option java_package = "servicestubs";


package grpcservice;


// Contract operations


service SFService {


rpc submitImage(stream ImageChunk) returns(SubmitImageResponse);


rpc getImageData(ImageIdRequest) returns(GetImageDataResponse);

rpc searchImages(SearchImagesRequest) returns (SearchImagesResponse);

rpc listImages(ListImagesRequest) returns(ListImagesResponse);

rpc downloadImage(DownloadImageRequest) returns(stream ImageChunk);


}

message SubmitImageResponse{
  string request_id = 1;
}

message ImageIdRequest{
  string image_name = 1;
}

message GetImageDataResponse{
  string request_id = 1;
  string image_name = 2;
  google.protobuf.Timestamp processed_at = 3;

  repeated LabelData labels = 4;
}

message LabelData{
  string label_eng = 1;
  string label_pt = 2;

  float confidence_score = 3;
}

message SearchImagesRequest{
  google.protobuf.Timestamp date_start = 1;
  google.protobuf.Timestamp date_end = 2;
  string label = 3;
}

message SearchImagesResponse{
  repeated string image_names = 1;
}

message ListImagesRequest{
}

message ListImagesResponse{
  repeated string image_names = 1;
}

message ImageChunk{
  string image_name = 1;
  string content_type = 2;
  bytes data = 3;

}

message DownloadImageRequest{
  string image_name = 1;
}

service SGService{

  rpc increaseGrpcServers(ScaleRequest) returns(ScaleResponse);
  rpc decreaseGrpcServers(ScaleRequest) returns(ScaleResponse);

  rpc increaseProcessingInstances(ScaleRequest) returns(ScaleResponse);
  rpc decreaseProcessingInstances(ScaleRequest) returns(ScaleResponse);


}


message ScaleRequest{
  int32 amount = 1;

}


message ScaleResponse{
  bool success = 1;
  int32 previous_size = 2;
  int32 new_size = 3;
  string message = 4;

}
